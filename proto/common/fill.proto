syntax = "proto3";

package common;

option go_package = "github.com/open-exchange/matching_engine/proto/common";

message Fill {
  string id = 1;
  string tenant_id = 2;
  string trade_id = 3;
  
  string side = 4; // "buy" or "sell"
  string price = 5; // Decimal(72,0)
  string quantity = 6; // Decimal(72,0)
  string fee = 7; // Decimal(72,0)
  
  string meta = 8; // JSON string
  
  int64 created_at = 9;
  int64 updated_at = 10;
}
