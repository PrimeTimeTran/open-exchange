syntax = "proto3";

package common;

option go_package = "github.com/open-exchange/matching_engine/proto/common";

message Wallet {
  string id = 1;
  string tenant_id = 2;
  string user_id = 3;
  string account_id = 4;
  string asset_id = 5;
  
  // Balances are Decimal(72,0)
  string available = 6;
  string locked = 7;
  string total = 8;
  
  int32 version = 9;
  string status = 10;
  string meta = 13; // JSON string
  
  int64 created_at = 11;
  int64 updated_at = 12;
}
