syntax = "proto3";

package common;

option go_package = "github.com/open-exchange/matching_engine/proto/common";

message Chat {
  string id = 1;
  string tenant_id = 2;
  
  string name = 3;
  string media = 4; // JSON string
  bool active = 5;
  
  string meta = 6; // JSON string
  
  int64 created_at = 7;
  int64 updated_at = 8;
}
