syntax = "proto3";

package common;

option go_package = "github.com/open-exchange/matching_engine/proto/common";

message LedgerEvent {
  string id = 1;
  string tenant_id = 2;
  
  string type = 3; // e.g., "deposit", "trade", "fee"
  string reference_id = 4; // ID of the object causing the event (order_id, deposit_id)
  string reference_type = 5;
  string status = 6;
  string description = 7;
  
  string meta = 8; // JSON string
  
  int64 created_at = 9;
  int64 updated_at = 10;
}
