syntax = "proto3";

package common;

option go_package = "github.com/open-exchange/matching_engine/proto/common";

message Referral {
  string id = 1;
  string tenant_id = 2;
  string referrer_user_id = 3;
  string referred_user_id = 4;
  
  string referral_code = 5;
  string source = 6;
  string status = 7;
  string reward_type = 8;
  string reward_amount = 9;
  string reward_currency = 10;
  
  int64 rewarded_at = 11;
  string meta = 12; // JSON string
  
  int64 created_at = 13;
  int64 updated_at = 14;
}
