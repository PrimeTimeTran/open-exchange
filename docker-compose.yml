version: '3.8'

services:
  client:
    build:
      context: ./services/client
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/client:/app
      - /app/node_modules
      - /app/.next
      - ./proto:/app/proto
    ports:
      - '3000:3000'
    environment:
      - MATCHING_ENGINE_URL=matching:50051
      - MARKET_SERVICE_URL=market:50053
      # Use host.docker.internal to access localhost on the host machine (macOS/Windows)
      # You may need to update 'user:password' and 'crypto' to match your local credentials
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?schema=public
      # Enable polling for hot reload in Docker
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - matching
      # - db

  matching:
    build:
      context: ./services/matching
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/matching:/app
      - /app/tmp
    ports:
      - '50051:50051'
      - '8080:8080'
    environment:
      - PORT=50051

  ledger:
    build:
      context: ./services/ledger
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/ledger:/app
      - ./proto:/proto
      - /app/target
    ports:
      - '50052:50052'
      - '8081:8081'
    environment:
      # Use host.docker.internal to access localhost from container
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - RUST_LOG=info

  market:
    build:
      context: ./services/market
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/market:/app
      - /app/tmp
    ports:
      - '50053:50053'
    environment:
      - PORT=50053
      - REDIS_URL=redis://redis:6379

  # chain:
  #   build:
  #     context: ./services/chain
  #     dockerfile: Dockerfile.dev
  #   volumes:
  #     - ./services/chain:/app
  #     - /app/node_modules
  #   ports:
  #     - '8545:8545' # Hardhat dev chain RPC
  #     - '8546:8546' # Optional: WebSocket for chain
  #   environment:
  #     - NETWORK=hardhat # can use 'localhost' or a custom network name
  #   command: >
  #     sh -c "npx hardhat node --hostname 0.0.0.0"

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  redis_data:

