version: '3.8'

services:
  client:
    build:
      context: ./services/client
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/client:/app
      - /app/node_modules
      - /app/.next
      - ./proto:/app/proto
    ports:
      - '3000:3000'
    environment:
      - MATCHING_ENGINE_URL=matching:50051
      # Use host.docker.internal to access localhost on the host machine (macOS/Windows)
      # You may need to update 'user:password' and 'crypto' to match your local credentials
      - DATABASE_URL=postgresql://postgres@host.docker.internal:5432/scaffoldhub-localhost-app?schema=public
      # Enable polling for hot reload in Docker
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - matching
      # - db

  matching:
    build:
      context: ./services/matching
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/matching:/app
      - /app/tmp
    ports:
      - '50051:50051'
      - '8080:8080'
    environment:
      - PORT=50051

  ledger:
    build:
      context: ./services/ledger
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/ledger:/app
      - ./proto:/proto
      - /app/target
    ports:
      - '50052:50052'
      - '8081:8081'
    environment:
      # - DATABASE_URL=postgres://user:password@host.docker.internal:5432/crypto
      - RUST_LOG=info

  market:
    build:
      context: ./services/market
      dockerfile: Dockerfile.dev
    volumes:
      - ./services/market:/app
      - /app/tmp
    ports:
      - '50053:50053'
    environment:
      - PORT=50053

  # db:
  #   image: postgres:15-alpine
  #   environment:
  #     - POSTGRES_USER=user
  #     - POSTGRES_PASSWORD=password
  #     - POSTGRES_DB=crypto
  #   ports:
  #     - "5432:5432"
